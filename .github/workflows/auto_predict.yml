name: Auto Predict Weekly

on:
  schedule:
    # 毎週金曜日の日本時間18:00 (UTC 09:00) 枠順確定後
    - cron: '0 9 * * 5'
    # 毎週日曜日の日本時間09:30 (UTC 00:30) 最新オッズ反映後
    - cron: '30 0 * * 0'
  workflow_dispatch: # 手動でもボタンポチで実行できるようにする設定

jobs:
  predict_and_update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-batch.txt

    - name: Run Auto Prediction Script
      run: |
        python src/auto_batch_predict.py
        
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/latest_prediction.json
        # 変更がある場合のみコミット
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Update: Weekly Prediction" && git push)
