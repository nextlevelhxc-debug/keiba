name: Auto Predict Weekly

on:
  schedule:
    # 毎週金曜日の日本時間18:00 (UTC 09:00) 枠順確定後
    - cron: '0 9 * * 5'
    # 毎週土曜日の日本時間08:30 (UTC 23:30 Friday) 
    - cron: '30 23 * * 5'
    # 毎週日曜日の日本時間08:30 (UTC 23:30 Saturday)
    - cron: '30 23 * * 6'
  workflow_dispatch:
    inputs:
      status:
        description: '更新ステータスのメッセージ（例：【最新予想】、勝負用など）'
        required: false
        default: ''

jobs:
  predict_and_update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-batch.txt

    - name: Run Auto Prediction Script
      run: |
        python src/auto_batch_predict.py --status "${{ github.event.inputs.status }}"
        
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/latest_prediction.json
        # 変更がある場合のみコミット
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Update: Weekly Prediction" && git push)
